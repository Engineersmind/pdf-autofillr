[build-system]
requires = ["setuptools>=65.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pdf-autofiller-plugins"
version = "0.1.0"
description = "Plugin framework for PDF AutoFiller"
readme = "README.md"
requires-python = ">=3.9"
license = {text = "MIT"}
authors = [
    {name = "PDF AutoFiller Team", email = "team@pdf-autofiller.com"}
]
keywords = ["pdf", "plugin", "framework", "extensible"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries",
]

# No runtime dependencies - pure Python!
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "black>=23.0.0",
    "isort>=5.12.0",
    "mypy>=1.0.0",
]

[project.urls]
Homepage = "https://github.com/Engineersmind/pdf-autofillr"
Documentation = "https://github.com/Engineersmind/pdf-autofillr/tree/main/docs"
Repository = "https://github.com/Engineersmind/pdf-autofillr"
Issues = "https://github.com/Engineersmind/pdf-autofillr/issues"

[tool.setuptools]
packages = ["pdf_autofiller_plugins", "pdf_autofiller_plugins.interfaces"]

[tool.black]
line-length = 100
target-version = ["py39", "py310", "py311", "py312"]
include = '\.pyi?$'

[tool.isort]
profile = "black"
line_length = 100

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
