      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: "TODO: Define schema"
      responses:
        '200':
          description: Predictions retrieved
          content:
            application/json:
              schema:
                type: object
                description: "TODO: Define schema"

