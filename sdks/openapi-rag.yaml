openapi: 3.0.3
info:
  title: PDF RAG API
  description: |
    RAG (Retrieval-Augmented Generation) service for PDF field mapping predictions and feedback.
    
    This API provides:
    - RAG-based field mapping predictions
    - Feedback collection for continuous improvement
    - Vector search and similarity matching
    
    **TODO**: Complete this specification when RAG module is implemented.
    
  version: 1.0.0
  contact:
    name: Engineersmind
    email: team@engineersmind.com

servers:
  - url: https://api.example.com/v1/rag
    description: Production server
  - url: http://localhost:8001
    description: Local development server

security:
  - ApiKeyAuth: []

tags:
  - name: rag
    description: RAG operations for predictions and feedback

