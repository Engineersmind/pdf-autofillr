# PDF Autofiller - Mapper Configuration
# =====================================
# This file defines file paths and settings for the PDF autofiller mapper module.

[general]
# Storage source type: aws, azure, gcp, or local
source_type = local

# Enable/disable PDF hash caching (speeds up repeat processing of same PDF structure)
pdf_cache_enabled = true


[mapping]
# Mapping Configuration

# LLM Model - Use LiteLLM format
# Examples:
#   - claude-3-5-sonnet-20241022 (Anthropic Direct - requires ANTHROPIC_API_KEY)
#   - bedrock/anthropic.claude-3-5-sonnet-20241022-v2:0 (AWS Bedrock - requires AWS credentials)
#   - gpt-4o (OpenAI - requires OPENAI_API_KEY)
#   - azure/gpt-4 (Azure OpenAI - requires AZURE_API_KEY)
#   - vertex_ai/gemini-pro (Google - requires GOOGLE_APPLICATION_CREDENTIALS)
#   - ollama/llama2 (Local - requires Ollama running)
llm_model = gpt-5.2

# LLM Temperature (0.0 = deterministic, 1.0 = creative)
llm_temperature = 0.05

# Max tokens for LLM response
llm_max_tokens = 8192
# =====================================
# This file defines file paths and settings based on your [mapping]
# Mapping Configuration

# Max retries on failure
llm_max_retries = 3

# Confidence threshold for mappings
confidence_threshold = 0.7

# Chunking strategy: page, window, or document
chunking_strategy = page

# Use second mapper (RAG) in parallel with semantic mapper
use_second_mapper = false

# Default investor type
default_investor_type = individual


[aws]
# AWS S3 Configuration
# All paths should start with s3://bucket-name/...

# Hash cache registry file location
cache_registry_path = s3://your-bucket/pdf-autofiller/cache/hash_registry.json

# Global input JSON template (optional - used as default input keys)
global_input_json_s3_uri = s3://your-bucket/global_input_keys.json

# RAG (Retrieval-Augmented Generation) bucket for second mapper
rag_bucket_name = rag-bucket-pdf-filler

# Output directory structure (relative to bucket root)
# These paths are auto-generated based on user_id and pdf_doc_id
# Format: s3://{bucket}/users/{user_id}/pdfs/{pdf_doc_id}/{stage}/{filename}
output_base_path = s3://your-bucket/pdf-autofiller

# Temporary local directory for processing (Lambda uses /tmp/)
temp_local_dir = /tmp


[azure]
# Azure Blob Storage Configuration
# All paths should start with azure://container-name/...

# Hash cache registry file location
cache_registry_path = azure://your-container/pdf-autofiller/cache/hash_registry.json

# Global input JSON template
global_input_json_uri = azure://your-container/global_input_keys.json

# RAG container for second mapper
rag_container_name = rag-container-pdf-filler

# Output directory structure
output_base_path = azure://your-container/pdf-autofiller

# Temporary local directory for processing
temp_local_dir = /tmp


[gcp]
# Google Cloud Storage Configuration
# All paths should start with gs://bucket-name/...

# Hash cache registry file location
cache_registry_path = gs://your-bucket/pdf-autofiller/cache/hash_registry.json

# Global input JSON template
global_input_json_uri = gs://your-bucket/global_input_keys.json

# RAG bucket for second mapper
rag_bucket_name = rag-bucket-pdf-filler

# Output directory structure
output_base_path = gs://your-bucket/pdf-autofiller

# Temporary local directory for processing
temp_local_dir = /tmp


[local]
# Local Filesystem Configuration
# Paths work for both local development and Docker:
# - Local development: Use relative paths (../../data/)
# - Docker: Use absolute paths (/app/data/)
# The application automatically detects if running in Docker and adjusts paths

# Source storage paths (where files are before processing)
# Local: ../../data/modules/mapper_sample/input/
# Docker: /app/data/modules/mapper_sample/input/
input_base_path = /app/data/modules/mapper_sample/input/
output_base_path = /app/data/modules/mapper_sample/output

# Global input JSON template (pdf_registry.json) - in root data directory
local_global_json = /app/data/modules/mapper_sample/input/input.json

# Hash cache registry file location
cache_registry_path = /app/data/modules/mapper_sample/cache/hash_registry.json

# Docker processing directory (where operations actually work)
processing_dir = /tmp/processing

# RAG data directory (for second mapper)
rag_data_dir = /app/data/modules/mapper_sample/rag-data

# Temporary directory for processing (old - use processing_dir above)
temp_local_dir = /app/data/modules/mapper_sample/tmp

# Input PDF file for testing (old - kept for backwards compatibility)
# Uses input_base_path if set
local_input_pdf = /app/data/modules/mapper_sample/input/small_4page.pdf

# Input JSON file with data to embed (old - kept for backwards compatibility)
# Uses input_base_path if set
local_input_json = /app/data/modules/mapper_sample/form_keys_flat.json


[paths]
# Path Templates - These define the structure of output paths
# Variables available: {user_id}, {pdf_doc_id}, {session_id}, {filename}, {stage}
# Stages: extraction, mapping, embedding, filling, headers, rag, cache

# Extraction stage
extraction_template = {output_base_path}/users/{user_id}/pdfs/{pdf_doc_id}/extraction/{filename}_extracted.json

# Mapping stage
mapping_template = {output_base_path}/users/{user_id}/pdfs/{pdf_doc_id}/mapping/{filename}_mapped.json
radio_groups_template = {output_base_path}/users/{user_id}/pdfs/{pdf_doc_id}/mapping/{filename}_radio_groups.json

# Embedding stage
embedded_pdf_template = {output_base_path}/users/{user_id}/pdfs/{pdf_doc_id}/embedding/{filename}_embedded.pdf

# Filling stage
filled_pdf_template = {output_base_path}/users/{user_id}/pdfs/{pdf_doc_id}/filling/{filename}_filled.pdf

# Headers stage (for dual mapper/RAG)
headers_with_fields_template = {output_base_path}/users/{user_id}/pdfs/{pdf_doc_id}/headers/{filename}_headers_with_fields.json
final_form_fields_template = {output_base_path}/users/{user_id}/pdfs/{pdf_doc_id}/headers/{filename}_final_form_fields.json

# RAG predictions (ephemeral - not cached, regenerated each time)
llm_predictions_template = {rag_base_path}/users/{user_id}/pdfs/{pdf_doc_id}/llm_predictions.json
rag_predictions_template = {rag_base_path}/users/{user_id}/pdfs/{pdf_doc_id}/rag_predictions.json
combined_predictions_template = {output_base_path}/users/{user_id}/pdfs/{pdf_doc_id}/mapping/{filename}_combined_predictions.json

# Cache paths (for hash-based caching)
# cache/ is a sibling of input/ and output/, NOT nested under output/
cache_base_path = /app/data/modules/mapper_sample/cache
cache_registry_template = {cache_base_path}/hash_registry.json
cached_files_template = {cache_base_path}/files/{pdf_hash}/{filename}


[headers]
# Headers Extraction Configuration
# Headers module uses a separate LLM configuration optimized for document structure extraction

# LLM provider for headers: openai or claude
# Note: With LiteLLM, this is mainly for backwards compatibility
# The actual model is determined by headers_openai_model_id or headers_claude_model_id
headers_llm_provider = openai

# OpenAI model for headers (used when headers_llm_provider = openai)
# Examples: gpt-4o, gpt-4-turbo, gpt-3.5-turbo
headers_openai_model_id = gpt-4.1

# Claude model for headers (used when headers_llm_provider = claude)
# Examples: claude-3-5-sonnet-20241022, claude-3-opus-20240229, claude-3-sonnet-20240229
headers_claude_model_id = claude-3-5-sonnet-20241022

# Temperature for headers LLM (0.0 = deterministic, 1.0 = creative)
# Recommended: 0.0 for consistent structure extraction
headers_temperature = 0.1

# Max tokens for headers LLM response
# Headers typically need more tokens than semantic mapping due to complex prompts
headers_max_tokens = 32000

# Number of pages to process per chunk
# Larger chunks = fewer LLM calls but longer prompts
# Smaller chunks = more LLM calls but faster processing
headers_chunk_size = 5

# Maximum concurrent workers for parallel chunk processing
# Adjust based on your system resources and API rate limits
headers_max_workers = 8


[extraction]
# Extraction Configuration

# Widget line distance threshold (pixels)
widget_line_distance_threshold = 10

# Coordinate rounding precision
rounding = 1


[logging]
# Logging Configuration

# Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
log_level = INFO

# Log format
log_format = %(asctime)s - %(name)s - %(levelname)s - %(message)s

# Enable detailed extractor logs
extractor_debug = false

# Enable detailed mapper logs
mapper_debug = false


[performance]
# Performance and Optimization Settings

# Enable async processing where possible
async_enabled = true

# Maximum concurrent operations
max_concurrent_operations = 5

# Timeout for LLM API calls (seconds)
llm_timeout = 300

# Timeout for RAG API calls (seconds)
rag_timeout = 180

# Retry attempts for failed API calls
api_retry_attempts = 3


[gpu]
# GPU Configuration for Local LLM Deployments
# These settings only apply when using local LLMs (Ollama, LM Studio, LocalAI)

# Enable GPU acceleration (requires NVIDIA GPU with CUDA or Apple Silicon)
# Options: auto, cuda, mps, cpu
#   - auto: Automatically detect and use available GPU
#   - cuda: Force NVIDIA CUDA (requires CUDA toolkit)
#   - mps: Force Apple Silicon GPU (M1/M2/M3)
#   - cpu: Force CPU-only (no GPU acceleration)
gpu_mode = auto

# GPU memory limit (MB) - Useful for running multiple models or limiting VRAM usage
# 0 = unlimited (use all available VRAM)
# Recommended: Leave 2-4GB free for system
# Example: If you have 8GB VRAM, set to 6000 (6GB)
gpu_memory_limit = 0

# Number of GPU layers to offload to GPU (Ollama-specific)
# Higher = faster but more VRAM usage
# 0 = CPU only, -1 = auto (all layers), or specify exact number
# Example: 35 for 7B models, 80 for 70B models
num_gpu_layers = -1

# Enable low-VRAM mode (useful for systems with < 8GB VRAM)
# Trades speed for memory efficiency
low_vram_mode = false

# GPU device selection (for multi-GPU systems)
# 0 = first GPU, 1 = second GPU, etc.
# -1 = use all available GPUs
gpu_device = 0


[notifications]
# Notification System Configuration

# Enable Microsoft Teams notifications
teams_notifications_enabled = false

# Teams webhook URL
teams_webhook_url = 

# Notification level: INFO, WARNING, ERROR, CRITICAL
notification_level = WARNING

# Include detailed metadata in notifications
include_metadata = true


# =====================================
# FILE NAMING PATTERNS
# =====================================
# These patterns define how files are named based on user_id, session_id, pdf_doc_id

[file_naming]
# Input files (in source storage - /app/data/input for local)
input_pdf_pattern = {user_id}_{session_id}_{pdf_doc_id}.pdf
input_json_pattern = {user_id}_{session_id}_{pdf_doc_id}.json

# Processing files (in Docker /tmp/processing)
processing_input_pdf = {user_id}_{session_id}_{pdf_doc_id}_input.pdf
processing_input_json = {user_id}_{session_id}_{pdf_doc_id}_data.json

# Pipeline outputs (in Docker /tmp/processing)
extracted_json = {user_id}_{session_id}_{pdf_doc_id}_extracted.json
mapped_json = {user_id}_{session_id}_{pdf_doc_id}_mapped_fields.json
radio_groups_json = {user_id}_{session_id}_{pdf_doc_id}_radio_groups.json
embedded_pdf = {user_id}_{session_id}_{pdf_doc_id}_embedded.pdf
filled_pdf = {user_id}_{session_id}_{pdf_doc_id}_filled.pdf

# Dual mapper (RAG) outputs (in Docker /tmp/processing)
headers_with_fields = {user_id}_{session_id}_{pdf_doc_id}_headers_with_fields.json
final_form_fields = {user_id}_{session_id}_{pdf_doc_id}_final_form_fields.json
header_file = {user_id}_{session_id}_{pdf_doc_id}_header_file.json
section_file = {user_id}_{session_id}_{pdf_doc_id}_section_file.json
llm_predictions = {user_id}_{session_id}_{pdf_doc_id}_llm_predictions.json
rag_predictions = {user_id}_{session_id}_{pdf_doc_id}_rag_predictions.json
final_predictions = {user_id}_{session_id}_{pdf_doc_id}_final_predictions.json
java_mapping = {user_id}_{session_id}_{pdf_doc_id}_final_mapping_json_combined_java.json

# Output files (in source storage - /app/data/output for local)
output_extracted_json = {user_id}_{session_id}_{pdf_doc_id}_extracted.json
output_mapped_json = {user_id}_{session_id}_{pdf_doc_id}_mapped_fields.json
output_radio_groups_json = {user_id}_{session_id}_{pdf_doc_id}_radio_groups.json
output_embedded_pdf = {user_id}_{session_id}_{pdf_doc_id}_embedded.pdf
output_filled_pdf = {user_id}_{session_id}_{pdf_doc_id}_filled.pdf

# Dual mapper output files (if used)
output_semantic_mapping_json = {user_id}_{session_id}_{pdf_doc_id}_semantic_mapping.json
output_headers_with_fields_json = {user_id}_{session_id}_{pdf_doc_id}_headers_with_fields.json
output_final_form_fields_json = {user_id}_{session_id}_{pdf_doc_id}_final_form_fields.json
output_header_file_json = {user_id}_{session_id}_{pdf_doc_id}_header_file.json
output_section_file_json = {user_id}_{session_id}_{pdf_doc_id}_section_file.json
output_llm_predictions = {user_id}_{session_id}_{pdf_doc_id}_llm_predictions.json
output_java_mapping = {user_id}_{session_id}_{pdf_doc_id}_final_mapping_json_combined_java.json
output_final_predictions = {user_id}_{session_id}_{pdf_doc_id}_final_predictions.json
output_rag_predictions = {user_id}_{session_id}_{pdf_doc_id}_rag_predictions.json

# Cache output file (shared across all PDFs)
output_cache_registry_json = hash_registry.json


# =====================================
# USAGE EXAMPLES
# =====================================
#
# AWS S3 Example:
#   source_type = aws
#   cache_registry_path = s3://my-bucket/pdf-autofiller/cache/hash_registry.json
#   output_base_path = s3://my-bucket/pdf-autofiller
#
# Azure Blob Example:
#   source_type = azure
#   cache_registry_path = azure://my-container/pdf-autofiller/cache/hash_registry.json
#   output_base_path = azure://my-container/pdf-autofiller
#
# Local Filesystem Example:
#   source_type = local
#   cache_registry_path = /Users/myuser/pdf-autofiller/cache/hash_registry.json
#   output_base_path = /Users/myuser/pdf-autofiller/output
#
# For integration testing with local data:
#   source_type = local
#   cache_registry_path = /Users/raghava/Documents/EMC/pdf-autofillr/data/modules/mapper_sample/hash_registry.json
#   output_base_path = /Users/raghava/Documents/EMC/pdf-autofillr/data/modules/mapper_sample/output
